clash_royale:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: '../database/data/mydb.duckdb'
      schema: main
      threads: 4
      # Read raw parquet straight from S3 (httpfs). The secret uses the AWS
      # credential chain — the EC2 instance role on the box, or your local
      # AWS profile (e.g. AWS_PROFILE=erling) when running on your machine.
      # No keys are stored in this file.
      extensions:
        - httpfs
      secrets:
        - type: s3
          provider: credential_chain
          region: eu-north-1
