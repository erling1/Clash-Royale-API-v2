name: build-and-push

# Builds all three images (api, frontend, pipeline) as linux/amd64 — GitHub
# runners are amd64 == t3.micro arch — and pushes them to GHCR. The box pulls.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "Dockerfile.pipeline"
      - "extract/**"
      - "dbt/**"
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: pipeline
            context: .
            dockerfile: Dockerfile.pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          # Owner is lowercased automatically by GHCR (Clash-Royale-API-v2 -> clash-royale-api-v2).
          tags: |
            ghcr.io/${{ github.repository_owner }}/clash-royale-api-v2/${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/clash-royale-api-v2/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
